# Production Docker Compose � NeuraLeads AI
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: ra_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-exzelon_ra_agent}
      MYSQL_USER: ${DB_USER:-ra_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    container_name: ra_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ra_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=PROD
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${PROD_DB_NAME:-exzelon_ra_agent}
      - DB_USER=${PROD_DB_USER}
      - DB_PASSWORD=${PROD_DB_PASSWORD}
      - SECRET_KEY=${PROD_SECRET_KEY}
      - ENCRYPTION_KEY=${PROD_ENCRYPTION_KEY}
      - REDIS_URL=redis://redis:6379/0
      - HOST=0.0.0.0
      - PORT=8000
      - BASE_URL=${PROD_BASE_URL}
      - CORS_ORIGINS=${PROD_CORS_ORIGINS}
      - CONTACT_PROVIDER=${CONTACT_PROVIDER:-mock}
      - EMAIL_VALIDATION_PROVIDER=${EMAIL_VALIDATION_PROVIDER:-mock}
      - EMAIL_SEND_MODE=${EMAIL_SEND_MODE:-mailmerge}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ra_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  mysql_data:
  redis_data:

networks:
  default:
    name: ra_production
